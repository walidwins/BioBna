<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BioBna | Réseaux sociaux</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

body{

background-image:url("ppp.jpg");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
padding:20px;

}

/* Carte */

.container{

background:rgba(255,255,255,0.95);

width:100%;
max-width:420px;

padding:30px 25px;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,0.25);

text-align:center;

}

/* Photo */

.profile-pic{

width:110px;
height:110px;

border-radius:50%;

border:4px solid #ddd;

margin-bottom:10px;

}

.name{

font-size:26px;
font-weight:bold;
color :rgb(29, 171, 51);
margin-bottom:5px;

}

.subtitle{

color:#777;

margin-bottom:25px;

}

/* réseaux */

.links{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}

.social{

display:flex;

align-items:center;
justify-content:center;

gap:10px;

padding:16px;

border-radius:12px;

text-decoration:none;

font-size:17px;

font-weight:bold;

background:#f2f2f2;

color:#333;

cursor:pointer;

transition:all 0.25s ease;

box-shadow:0 4px 10px rgba(0,0,0,0.1);

}

.social i{

font-size:22px;

}

/* effet hover */

.social:hover{

transform:translateY(-3px);

box-shadow:0 8px 20px rgba(0,0,0,0.2);

}

/* effet click mobile */

.social:active{

transform:scale(0.95);

}

/* couleurs */

.instagram:hover{
background:#E1306C;
color:white;
}

.tiktok:hover{
background:#000;
color:white;
}

.facebook:hover{
background:#1877F2;
color:white;
}

.linkedin:hover{
background:#0A66C2;
color:white;
}

/* WhatsApp */

.contact{

margin-top:25px;

}

.whatsapp-btn{

display:block;

margin-top:10px;

padding:15px;

background:#25D366;

color:white;

text-decoration:none;

border-radius:12px;

font-size:18px;

font-weight:bold;

transition:0.3s;

}

.whatsapp-btn:hover{

background:#1da851;

}

/* mobile */

@media (max-width:480px){

.links{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<img src="logo.jpg" class="profile-pic">

<div class="name">BioBna</div>

<div class="subtitle">Suivez-nous sur nos réseaux sociaux</div>

<div class="links">

<a href="https://www.instagram.com/bio_bna_officiel"
class="social instagram"
target="_blank">

<i class="fab fa-instagram"></i>
Instagram

</a>

<a href="https://www.tiktok.com/@bio.bna"
class="social tiktok"
target="_blank">

<i class="fab fa-tiktok"></i>
TikTok

</a>

<a href="https://www.facebook.com/share/1Baz6VdAYy"
class="social facebook"
target="_blank">

<i class="fab fa-facebook"></i>
Facebook

</a>

<a href="https://www.linkedin.com/in/bio-bna-13505934a"
class="social linkedin"
target="_blank">

<i class="fab fa-linkedin"></i>
LinkedIn

</a>

</div>

<div class="contact">

<h3>Contactez-nous</h3>

<a href="https://wa.me/212719508999"
class="whatsapp-btn"
target="_blank">

<i class="fab fa-whatsapp"></i>
Envoyer un message WhatsApp

</a>

</div>

</div>

</body>

</html>
